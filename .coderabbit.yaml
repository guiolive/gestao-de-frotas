language: pt-BR
early_access: false
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!**/*.lock"
    - "!**/node_modules/**"
    - "!**/.next/**"
    - "!**/dist/**"
    - "!**/*.tsbuildinfo"
    - "!src/generated/**"

  path_instructions:
    - path: "**"
      instructions: |
        Contexto de domínio (vale pra qualquer arquivo deste repo):

        - Sistema da Diretoria de Logística da UFG. Usuários primários:
          Coordenador de Manutenção (CMAN) e Coordenador de Transporte.
          Substitui processo manual papel→Forms→Prime.
        - OS de manutenção SEMPRE nasce com status "pendente revisão CMAN".
          Motoristas antigos preenchem em papel; alguém digitaliza depois.
          Não criar OS já aprovada nem pular esse status.
        - Veículo com FIPE ≥ 40% de custo acumulado de manutenção é
          classificado como "antieconômico". Esse limiar é regra de negócio,
          não constante mágica — qualquer mudança precisa estar documentada.
        - Itens de farol e palhetas FICAM FORA da preventiva (são consumíveis
          sob demanda). Não incluir em alertas de KM nem em rotinas de
          manutenção preventiva automática.
        - Todo veículo em manutenção deve inativar automaticamente
          (status='manutencao' ou 'inativo') — não fica "disponível".
        - LGPD: dados de motorista (CPF, CNH, telefone) e usuários
          (e-mail @ufg.br) são pessoais. Aponte qualquer log/dump/response
          que exponha esses campos sem necessidade.

    - path: "prisma/migrations/**"
      instructions: |
        Migrations são imutáveis depois de aplicadas em produção. Aponte:
        - Renomes de coluna sem ALTER ... RENAME (recriação destrói dado).
        - DROP COLUMN sem janela de transição.
        - ALTER de tipo incompatível com dado existente.
        - Falta de índice em FK ou em coluna usada em WHERE frequente.

    - path: "src/app/api/**"
      instructions: |
        Toda rota de API precisa:
        - Validar input com Zod antes de tocar Prisma (prevenir mass-assignment).
        - Verificar sessão via verificarToken/cookie em rotas autenticadas.
        - Logar erros via logger pino, não console.
        - Retornar 4xx pra erro de cliente, 5xx só pra falha de servidor.
        Aponte: queries N+1, falta de transação em writes multi-tabela,
        exposição de hash de senha ou JWT secret em respostas.

    - path: "src/components/**"
      instructions: |
        Componentes server por padrão; "use client" só quando necessário
        (handlers, hooks, browser APIs). Aponte client components que
        poderiam ser server. Aponte vazamento de dado sensível pra cliente
        (senha, token, e-mail de outros usuários).

    - path: "src/lib/**"
      instructions: |
        Funções utilitárias; sem efeito colateral em import. Não faça query
        Prisma fora de routes/server components.

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
